[build]
  base = "presentation-sparring/frontend"
  command = "npm run build"
  publish = "dist"
  # Skip the build entirely when a merge/push doesn't touch the frontend (or
  # this file) — saves build-minute credits on backend-only PRs.
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- presentation-sparring/frontend netlify.toml"

[build.environment]
  NODE_VERSION = "20"
