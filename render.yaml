services:
  - type: web
    name: presentation-sparring-api
    runtime: python
    plan: free
    rootDir: presentation-sparring/backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.4"
      - key: LLM_PROVIDER
        value: openai
      - key: FRONTEND_ORIGIN
        value: http://localhost:5173
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
